version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scaffolding-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scaffolding_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scaffolding-redis
    restart: always
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: scaffolding-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scaffolding_dev
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: development
      JWT_ACCESS_SECRET: change-me-to-a-random-32-char-string-at-minimum
      JWT_REFRESH_SECRET: change-me-to-another-random-32-char-string
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: scaffolding-frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
